name: Weekly Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 0'  # 毎週日曜日 19:00 JST (UTC 10:00) / 米東部 5-6時

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check DeepL Quota and generate CSV
        env:
          DEEPL_AUTH_KEY: ${{ secrets.DEEPL_AUTH_KEY }}
        run: |
          # 実行すると data/deepl_usage_log.csv に1行追記される
          python3 scripts/check_deepl_quota.py

      - name: Commit and push CSV log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/deepl_usage_log.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: add DeepL usage log ($(date -u +%Y-%m-%d))"
            git push origin main
          fi

      - name: Send DM Report via X API
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_TARGET_USERNAME: ${{ secrets.X_TARGET_USERNAME }}
        run: |
          set -e
          total_entries=$(python3 -c 'import json; print(json.load(open("data/entries.json"))["total_entries"])')
          
          # CSVの最後の行から残り枠と使用数を取得
          last_line=$(tail -n 1 data/deepl_usage_log.csv)
          used=$(echo "$last_line" | awk -F',' '{print $2}')
          limit=$(echo "$last_line" | awk -F',' '{print $3}')
          remaining=$(echo "$last_line" | awk -F',' '{print $4}')
          
          MESSAGE="📊【Japan OTAKU Insider 週間レポート】

現在の総記事数: $total_entries 件
DeepL翻訳 今月の使用量:
▶️ 使用済み: $used 文字
▶️ 残り枠: $remaining 文字 ($limit 文字中)

今週も1週間お疲れ様でした！自動更新は正常に稼働中です✨"

          python3 scripts/send_x_dm.py --message "$MESSAGE"
