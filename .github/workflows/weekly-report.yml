name: Weekly Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 0'  # 毎週日曜日 19:00 JST (UTC 10:00) / 米東部 5-6時

concurrency:
  group: joi-weekly-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send DM Report via X API
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_TARGET_USERNAME: ${{ secrets.X_TARGET_USERNAME }}
        run: |
          set -e
          total_entries=$(python3 -c 'import json; print(json.load(open("data/entries.json"))["total_entries"])')

          MESSAGE="📊【Japan OTAKU Insider 週間レポート】

現在の総記事数: $total_entries 件
翻訳: Google翻訳（deep_translator）を日次パイプラインで利用中（DeepL 枠レポートは廃止）

今週も1週間お疲れ様でした！自動更新は正常に稼働中です✨"

          python3 scripts/send_x_dm.py --message "$MESSAGE"
