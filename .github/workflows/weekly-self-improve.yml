# 週次: 統計JSON → Claude でサイト統計レポート（日本語）→ Claude で Perplexity 用 prompts 改善案（JSON + proposed_prompts/*）
# 週次の第一モデル（Opus/Sonnet 先）は scripts/weekly_self_improve_loop.py がカレンダーで決定:
#   〜2026-05-31（JST）: Opus 先（基準期間） / 2026-06-01〜: 偶数月 Sonnet 先・奇数月 Opus 先（品質比較）
# 上書き: Repo Variables（または Secrets 経由の同名）で ANTHROPIC_WEEKLY_LLM_ORDER=opus_first|sonnet_first
# 成果物はリポジトリに自動コミットしない。Actions の Artifact からダウンロードして人間が差分確認後、prompts/ を手動または別PRで反映する。
#
# 必要な Secrets:
#   ANTHROPIC_API_KEY      … Anthropic Console（必須）
#   ANTHROPIC_OPUS_MODEL   … 省略時は scripts 側の既定（claude-opus-4-6）
#   ANTHROPIC_SONNET_MODEL … Sonnet（opus_first 時はフォールバック＋JOI英語補完）
#   ANTHROPIC_MODEL        … フォールバック用
#   GA4_CREDENTIALS_JSON   … GA4サービスアカウントJSON（任意）
#   GA4_PROPERTY_ID        … GA4プロパティID（任意）
#   GEMINI_API_KEY         … 日次検閲など他処理との共通管理用（この週次本体では必須ではない）
#   DISCORD_WEBHOOK_URL    … 改善案通知先（任意）

name: Weekly Self-Improve Loop

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * 1" # 月曜 20:00 JST（UTC 11:00）

concurrency:
  group: joi-weekly-improve
  cancel-in-progress: false

jobs:
  self-improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run weekly self-improve loop
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_MODEL: ${{ secrets.PERPLEXITY_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          ANTHROPIC_OPUS_MODEL: ${{ secrets.ANTHROPIC_OPUS_MODEL }}
          ANTHROPIC_SONNET_MODEL: ${{ secrets.ANTHROPIC_SONNET_MODEL }}
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          # 空のままならスクリプト内カレンダー判定。強制したいときだけ Variable に opus_first / sonnet_first
          ANTHROPIC_WEEKLY_LLM_ORDER: ${{ vars.ANTHROPIC_WEEKLY_LLM_ORDER }}
        run: |
          python3 scripts/weekly_self_improve_loop.py \
            --out-dir artifact-out \
            --emit-joi-json artifact-out/joi_entry_source.json \
            --require-anthropic

      - name: Build weekly JOI entry JSON
        if: hashFiles('artifact-out/joi_entry_source.json') != ''
        run: |
          python3 scripts/build_weekly_joi_entry.py --input artifact-out/joi_entry_source.json --output artifact-out/joi_entry.json --header-image cool

      - name: Add JOI entry and rebuild JP file
        if: hashFiles('artifact-out/joi_entry.json') != ''
        run: |
          python3 scripts/add_entry.py artifact-out/joi_entry.json
          python3 scripts/sort_entries.py
          python3 scripts/build_ja_entries.py

      - name: Commit and push JOI entry
        id: push_step
        if: hashFiles('artifact-out/joi_entry.json') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/entries.json data/entries_ja.json
          if git diff --staged --quiet; then
            echo "No JOI entry changes to commit."
            exit 0
          fi
          git commit -m "chore: add weekly JOI bulletin ($(date -u +%Y-%m-%d))"
          if ! git pull --rebase origin main; then
            echo "WARNING: rebase にコンフリクトが発生。abort して push をスキップします。"
            git rebase --abort || true
            echo "push_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git push origin main; then
            echo "push_failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post weekly Top5 to X
        if: always()
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_MAX_POSTS_PER_RUN: "12"
        run: |
          python3 scripts/post_to_x.py --weekly-top5 --limit 5 || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-self-improve-${{ github.run_id }}
          path: artifact-out/
          retention-days: 30

      - name: Notify weekly proposals to Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          PUSH_FAILED: ${{ steps.push_step.outputs.push_failed }}
        run: |
          python3 scripts/notify_discord_weekly.py \
            --proposals artifact-out/claude_prompt_proposals.json \
            --report artifact-out/weekly_report_ja.md || true
          if [ "$PUSH_FAILED" = "true" ] && [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\":\"⚠️ **Weekly Self-Improve: git push 失敗** — rebase コンフリクトまたは push エラーが発生。手動確認が必要です。\"}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi
