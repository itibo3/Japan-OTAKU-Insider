# Japan OTAKU Insider — 日次更新ワークフロー（手動トリガ版）
#
# 目的: RSS取得 → DeepL翻訳 → entries.json 反映 → ステータス更新 → デプロイ
# 前提: DEEPL_AUTH_KEY が Secrets に設定されている場合のみ実行
#       未設定の場合は安全終了（何も変更せず exit 0）
#
# 実行: Actions タブ → "Daily Update" → "Run workflow"

name: Daily Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'  # 毎日 19:00 JST (UTC 10:00) / 米東部 5-6時

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_key: ${{ steps.check.outputs.has_key }}
    steps:
      - name: Check DEEPL_AUTH_KEY
        id: check
        run: |
          if [ -n "${{ secrets.DEEPL_AUTH_KEY }}" ]; then
            echo "DEEPL_AUTH_KEY が設定されています。更新処理を実行します。"
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "DEEPL_AUTH_KEY が未設定です。更新処理をスキップして正常終了します。"
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

  update:
    needs: check
    if: needs.check.outputs.has_key == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: RSS Fetch
        run: |
          echo "==> RSS Fetch"
          python3 -c "import json; d=json.load(open('data/sources.json')); print('Using', len(d.get('sources',[])), 'sources from data/sources.json')"
          python3 scripts/rss_fetch.py --limit 15 --fetch-thumbnails

      - name: Perplexity Search (6 categories)
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          echo "==> Perplexity Search"
          mkdir -p data/staging
          for cat in cafe vtuber figure game anime other; do
            python3 scripts/perplexity_search.py --category "$cat" || true
          done

      - name: Translate staging
        env:
          DEEPL_AUTH_KEY: ${{ secrets.DEEPL_AUTH_KEY }}
        run: |
          echo "==> Check DeepL Quota"
          if ! python3 scripts/check_deepl_quota.py --require 20000; then
            echo "DeepL remaining quota is low. Skipping translation."
            python3 scripts/send_x_dm.py --message "🚨【Japan OTAKU Insider】DeepL翻訳APIの無料枠（残機）が残り2万文字を切りました！
          今月の自動翻訳を安全のため停止しました。これ以上の記事は未翻訳のまま保留され、来月に再実行されます。" || true
            rm -f data/staging/*.json
            exit 0
          fi

          echo "==> Translate staging"
          mkdir -p data/staging
          count=0
          fail=0
          for f in data/staging/*.json; do
            [ -f "$f" ] || continue
            echo "Translating $f ..."
            if python3 scripts/translate_with_deepl.py "$f"; then
              count=$((count+1))
            else
              echo "WARNING: $f の翻訳に失敗（破棄して続行）"
              rm -f "$f"
              fail=$((fail+1))
            fi
          done
          echo "Translated $count file(s), failed $fail file(s)."

      - name: Add entries
        run: |
          set -e
          echo "==> Add entries"
          count=0
          for f in data/staging/*.json; do
            [ -f "$f" ] || continue
            echo "Adding entries from $f ..."
            python3 scripts/add_entry.py "$f"
            count=$((count+1))
          done
          echo "Added from $count file(s)."

      - name: Sort entries (newest first)
        run: |
          echo "==> Sort entries"
          python3 scripts/sort_entries.py

      - name: Fill missing thumbnails
        run: |
          echo "==> Fill missing thumbnails (CI: --limit 200)"
          python3 scripts/fill_og_images.py --only-missing --replace-generic --limit 200

      - name: Update status
        run: |
          echo "==> Update status"
          python3 scripts/update_status.py

      - name: Build entries_ja.json
        run: |
          echo "==> Build entries_ja.json (JP版自動生成)"
          python3 scripts/build_ja_entries.py

      - name: Commit and push
        run: |
          echo "==> Commit and push"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/entries.json data/entries_ja.json
          git add data/.x_posted_ids 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: auto-update entries ($(date -u +%Y-%m-%d))"
          if ! git pull --rebase origin main; then
            echo "WARNING: rebase にコンフリクトが発生。abort して push をスキップします。"
            git rebase --abort || true
            exit 0
          fi
          git push origin main

      - name: Post new entries to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          echo "==> Post to X (Twitter)"
          python3 scripts/post_to_x.py || true

      - name: Save X posted IDs
        run: |
          if [ -f data/.x_posted_ids ] && ! git diff --quiet data/.x_posted_ids 2>/dev/null; then
            git add data/.x_posted_ids
            git commit -m "chore: update X posted IDs" || true
            git push origin main || true
          fi

      - name: Diagnose on failure
        if: failure()
        run: |
          echo "=== 失敗診断 ==="
          echo "data/staging:"
          ls -la data/staging 2>/dev/null || echo "(dir not found)"
          echo "entries.json head:"
          head -20 data/entries.json 2>/dev/null || echo "(not found)"
