# Japan OTAKU Insider — 日次更新ワークフロー（手動トリガ版）
#
# 目的: RSS取得 → Google翻訳（deep_translator）→ 不備時は DeepL で再翻訳 → entries.json 反映 → ステータス更新 → デプロイ
# 前提: 基本は Google のみ。secrets.DEEPL_AUTH_KEY があれば Google 失敗・不備分を DeepL でフォールバック
#
# 実行: Actions タブ → "Daily Update" → "Run workflow"

name: Daily Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'  # 毎日 19:00 JST (UTC 10:00) / 米東部 5-6時

concurrency:
  group: joi-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Snapshot entries before update
        run: |
          cp data/entries.json /tmp/entries_before_daily.json

      - name: RSS Fetch
        run: |
          echo "==> RSS Fetch"
          python3 -c "import json; d=json.load(open('data/sources.json')); print('Using', len(d.get('sources',[])), 'sources from data/sources.json')"
          python3 scripts/rss_fetch.py --limit 15 --fetch-thumbnails

      - name: Perplexity Search (6 categories)
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          echo "==> Perplexity Search"
          mkdir -p data/staging
          for cat in cafe vtuber figure game anime other; do
            python3 scripts/perplexity_search.py --category "$cat" || true
          done

      - name: Gemini Review for Perplexity staging
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: |
          echo "==> Gemini review (Perplexity staging)"
          mkdir -p data/staging
          mkdir -p data/review_logs
          for f in data/staging/perplexity_*.json; do
            [ -f "$f" ] || continue
            out="${f%.json}.reviewed.json"
            log="${f%.json}.review_log.json"
            python3 scripts/gemini_flash_review.py --input "$f" --output "$out" --log "$log" --missing-key-policy reject || true
            mv "$out" "$f"
            # 検閲ログを日次で保存（週次レポートで集計するため）
            day="$(TZ=Asia/Tokyo date +%Y%m%d)"
            catname="$(basename "$f" .json)"  # perplexity_{cat}_YYYYMMDD_HHMM
            mkdir -p "data/review_logs/${day}"
            mv "$log" "data/review_logs/${day}/${catname}.review_log.json" 2>/dev/null || true
          done

      - name: Translate staging
        env:
          DEEPL_AUTH_KEY: ${{ secrets.DEEPL_AUTH_KEY }}
        run: |
          echo "==> Translate staging (Google primary, DeepL fallback if key set)"
          mkdir -p data/staging
          count=0
          fail=0
          for f in data/staging/*.json; do
            [ -f "$f" ] || continue
            echo "Translating $f ..."
            if python3 scripts/translate_staging.py "$f" --delay 0.1; then
              count=$((count+1))
            else
              echo "WARNING: $f の翻訳に失敗（破棄して続行）"
              rm -f "$f"
              fail=$((fail+1))
            fi
          done
          echo "Translated $count file(s), failed $fail file(s)."

      - name: Add entries
        run: |
          set -e
          echo "==> Add entries"
          count=0
          for f in data/staging/*.json; do
            [ -f "$f" ] || continue
            echo "Adding entries from $f ..."
            python3 scripts/add_entry.py "$f"
            count=$((count+1))
          done
          echo "Added from $count file(s)."

      - name: Sort entries (newest first)
        run: |
          echo "==> Sort entries"
          python3 scripts/sort_entries.py

      - name: Fill missing thumbnails
        run: |
          echo "==> Fill missing thumbnails (CI: --limit 200)"
          python3 scripts/fill_og_images.py --only-missing --replace-generic --limit 200

      - name: Update status
        run: |
          echo "==> Update status"
          python3 scripts/update_status.py

      - name: Build entries_ja.json
        run: |
          echo "==> Build entries_ja.json (JP版自動生成)"
          python3 scripts/build_ja_entries.py

      - name: Generate static article pages (last 30 days)
        run: |
          echo "==> Generate static article pages for crawler"
          python3 scripts/generate_static_articles.py --days 30 --only-new --prev-entries /tmp/entries_before_daily.json

      - name: Post new entries to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_MAX_POSTS_PER_RUN: "12"
        run: |
          echo "==> Post to X (Twitter)"
          python3 scripts/post_to_x.py || true

      - name: Notify daily analytics to Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PUSH_FAILED: ${{ steps.push_step.outputs.push_failed }}
        run: |
          echo "==> Notify daily analytics to Discord"
          python3 scripts/daily_analytics_to_discord.py || true
          if [ "$PUSH_FAILED" = "true" ] && [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\":\"⚠️ **Daily Update: git push 失敗** — rebase コンフリクトまたは push エラーが発生。手動確認が必要です。\"}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi

      - name: Commit and push
        id: push_step
        run: |
          echo "==> Commit and push"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/entries.json data/entries_ja.json
          git add articles 2>/dev/null || true
          git add sitemap.xml 2>/dev/null || true
          git add data/review_logs 2>/dev/null || true
          git add data/.x_posted_ids 2>/dev/null || true
          git add data/.x_post_run_state.json 2>/dev/null || true
          git add data/.x_api_pause.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: auto-update entries ($(date -u +%Y-%m-%d))"
          if ! git pull --rebase origin main; then
            echo "WARNING: rebase にコンフリクトが発生。abort して push をスキップします。"
            git rebase --abort || true
            echo "push_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git push origin main; then
            echo "push_failed=true" >> "$GITHUB_OUTPUT"
          fi



      - name: Diagnose on failure
        if: failure()
        run: |
          echo "=== 失敗診断 ==="
          echo "data/staging:"
          ls -la data/staging 2>/dev/null || echo "(dir not found)"
          echo "entries.json head:"
          head -20 data/entries.json 2>/dev/null || echo "(not found)"
