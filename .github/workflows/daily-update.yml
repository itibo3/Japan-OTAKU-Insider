# Japan OTAKU Insider — 日次更新ワークフロー（手動トリガ版）
#
# 目的: RSS取得 → DeepL翻訳 → entries.json 反映 → ステータス更新 → デプロイ
# 前提: DEEPL_AUTH_KEY が Secrets に設定されている場合のみ実行
#       未設定の場合は安全終了（何も変更せず exit 0）
#
# 実行: Actions タブ → "Daily Update" → "Run workflow"

name: Daily Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'  # 毎日 4:00 JST (UTC 19:00)

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_key: ${{ steps.check.outputs.has_key }}
    steps:
      - name: Check DEEPL_AUTH_KEY
        id: check
        run: |
          if [ -n "${{ secrets.DEEPL_AUTH_KEY }}" ]; then
            echo "DEEPL_AUTH_KEY が設定されています。更新処理を実行します。"
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "DEEPL_AUTH_KEY が未設定です。更新処理をスキップして正常終了します。"
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

  update:
    needs: check
    if: needs.check.outputs.has_key == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: RSS Fetch
        run: |
          echo "==> RSS Fetch"
          python3 scripts/rss_fetch.py --limit 15 --fetch-thumbnails

      - name: Perplexity Search (6 categories)
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          echo "==> Perplexity Search"
          mkdir -p data/staging
          for cat in cafe vtuber figure game anime other; do
            python3 scripts/perplexity_search.py --category "$cat" || true
          done

      - name: Translate staging
        env:
          DEEPL_AUTH_KEY: ${{ secrets.DEEPL_AUTH_KEY }}
        run: |
          set -e
          echo "==> Translate staging"
          mkdir -p data/staging
          count=0
          for f in data/staging/*.json; do
            [ -f "$f" ] || continue
            echo "Translating $f ..."
            python3 scripts/translate_with_deepl.py "$f"
            count=$((count+1))
          done
          echo "Translated $count file(s)."

      - name: Add entries
        run: |
          set -e
          echo "==> Add entries"
          count=0
          for f in data/staging/*.json; do
            [ -f "$f" ] || continue
            echo "Adding entries from $f ..."
            python3 scripts/add_entry.py "$f"
            count=$((count+1))
          done
          echo "Added from $count file(s)."

      - name: Sort entries (newest first)
        run: |
          echo "==> Sort entries"
          python3 scripts/sort_entries.py

      - name: Fill missing thumbnails
        run: |
          echo "==> Fill missing thumbnails (CI: --limit 10)"
          python3 scripts/fill_og_images.py --only-missing --limit 10

      - name: Update status
        run: |
          echo "==> Update status"
          python3 scripts/update_status.py

      - name: Commit and push
        run: |
          echo "==> Commit and push"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/entries.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update entries ($(date -u +%Y-%m-%d))"
            git push origin main
          fi

      - name: Diagnose on failure
        if: failure()
        run: |
          echo "=== 失敗診断 ==="
          echo "data/staging:"
          ls -la data/staging 2>/dev/null || echo "(dir not found)"
          echo "entries.json head:"
          head -20 data/entries.json 2>/dev/null || echo "(not found)"
