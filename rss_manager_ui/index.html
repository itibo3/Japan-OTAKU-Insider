<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <title>Japan OTAKU Insider — RSS Manager V2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#020617" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="app-header">
    <div class="title-block">
      <span class="logo">📡</span>
      <div>
        <h1>Japan OTAKU Insider — RSS Manager V2</h1>
        <p class="subtitle">RSSソースをまとめて管理するためのローカル専用ツール</p>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="sources">📡 ソース管理</button>
      <button class="tab" data-tab="articles">📥 収集記事</button>
      <button class="tab" data-tab="manual-add">✏️ 手動追加</button>
      <button class="tab disabled" data-tab="export" title="Phase C以降で有効になります">📤 エクスポート</button>
    </nav>
  </header>

  <main class="app-main">
    <section id="tab-sources" class="tab-panel active">
      <div id="import-banner" class="import-banner" style="display:none;">
        <p>登録済みソースがありません。下のボタンで読み込んでください。</p>
        <button id="import-banner-button" class="primary">sources.json から読み込む（あみあみ・4gamer など 22 件）</button>
      </div>
      <section class="card">
        <h2>RSS検索と追加</h2>
        <div class="form-row">
          <input id="discover-url" type="url" placeholder="サイトURLを入力（例: https://natalie.mu/comic）" />
          <button id="discover-button">RSSを探す</button>
        </div>
        <div id="discover-result" class="result-box"></div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>登録済みソース</h2>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
              <button id="import-sources-button" class="secondary" title="data/sources.json からソースを読み込み（DBが空の場合や不整合時に使用）">sources.jsonから読み込む</button>
              <button id="export-sources-button" class="secondary" title="DBの内容をdata/sources.jsonに書き戻します（バックアップ作成あり）">sources.jsonへ書き戻す</button>
              <button id="push-github-button" class="secondary" title="sources.jsonを書き戻してGitHubにコミット・プッシュ">GitHubにプッシュ</button>
              <button id="check-all-button">全ソースの生存確認</button>
            </div>
        </div>
        <div class="table-wrap">
          <table class="sources-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>名前</th>
                <th>URL</th>
                <th>RSS</th>
                <th>カテゴリ</th>
                <th>状態</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="sources-tbody"></tbody>
          </table>
        </div>
      </section>
    </section>

    <section id="tab-articles" class="tab-panel">
      <section class="card">
        <div class="card-header">
          <h2>記事収集</h2>
          <div style="display:flex; gap:8px; align-items:center;">
            <label class="muted" for="fetch-limit" style="margin:0;">1ソースあたり</label>
            <input id="fetch-limit" type="number" min="1" max="50" value="5" style="width:90px;" />
            <button id="fetch-articles-button">収集</button>
          </div>
        </div>
        <div id="articles-fetch-summary" class="result-box" style="margin-top:10px;"></div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>新着一覧（最新順）</h2>
          <button id="refresh-articles-button" class="secondary">一覧更新</button>
        </div>
        <div id="articles-list" class="articles-list"></div>
      </section>
    </section>

    <section id="tab-manual-add" class="tab-panel">
      <section class="card">
        <div class="card-header">
          <h2>データ同期</h2>
          <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <button id="manual-pull-latest-button" class="secondary">⬇️ 最新データを取得（git pull）</button>
          </div>
        </div>
        <div id="manual-pull-result" class="result-box" style="display:none;"></div>
      </section>

      <section class="card">
        <h2>URL から記事情報を取得</h2>
        <div class="form-row">
          <input id="manual-url" type="url" placeholder="追加したい記事の URL を貼り付け…" />
          <button id="manual-fetch-meta-button">情報取得</button>
        </div>
        <div id="manual-fetch-result" class="result-box" style="display:none;"></div>
      </section>

      <section class="card">
        <h2>記事情報を確認・編集して追加</h2>
        <div class="manual-form">
          <label>タイトル（英語）<span class="req">必須</span>
            <input id="manual-title" type="text" placeholder="Article title in English" />
          </label>
          <label>タイトル（日本語）
            <input id="manual-title-ja" type="text" placeholder="日本語タイトル（省略可）" />
          </label>
          <label>概要（英語）<span class="req">必須</span>
            <textarea id="manual-description" rows="4" placeholder="Article description in English"></textarea>
          </label>
          <div class="form-row-2col">
            <label>カテゴリ<span class="req">必須</span>
              <select id="manual-category">
                <option value="anime">anime</option>
                <option value="cafe">cafe</option>
                <option value="cosplay">cosplay</option>
                <option value="figure">figure</option>
                <option value="game">game</option>
                <option value="vtuber">vtuber</option>
                <option value="other" selected>other</option>
              </select>
            </label>
            <label>公開日
              <input id="manual-date" type="date" />
            </label>
          </div>
          <label>サムネイル URL（省略可）
            <input id="manual-thumbnail" type="url" placeholder="https://..." />
          </label>
          <div id="manual-thumbnail-preview" style="display:none; margin-top:4px;">
            <img id="manual-thumbnail-img" src="" alt="thumbnail preview" style="max-width:240px; border-radius:6px; border:1px solid #334;" />
          </div>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;">
          <button id="manual-add-button" class="primary">entries.json に追加</button>
          <button id="manual-push-button" class="secondary" disabled>GitHub に公開</button>
        </div>
        <div id="manual-add-result" class="result-box" style="display:none; margin-top:10px;"></div>
      </section>
    </section>

    <section id="tab-export" class="tab-panel">
      <p class="muted">エクスポートタブは Phase C で実装予定です。</p>
    </section>
  </main>

  <footer class="app-footer">
    <span>RSS Manager V2 (Phase A) — ローカル専用</span>
  </footer>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("sw.js")
        .catch((err) => console.error("Service worker registration failed", err));
    }
  </script>
</body>

</html>
