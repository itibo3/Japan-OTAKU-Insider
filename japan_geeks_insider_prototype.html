<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan GEEKS Insider - Your Database of Japanese Otaku Culture</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-card: #12121a;
    --bg-card-hover: #1a1a28;
    --accent-pink: #ff3366;
    --accent-cyan: #00ccff;
    --accent-green: #00ff88;
    --accent-yellow: #ffcc00;
    --text-primary: #e8e8f0;
    --text-secondary: #8888aa;
    --text-dim: #555570;
    --border: #2a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', 'Noto Sans JP', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10, 10, 15, 0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 900;
  }

  .logo-text {
    font-weight: 900;
    font-size: 18px;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent-pink); }

  .nav {
    display: flex;
    gap: 8px;
  }

  .nav-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btn:hover, .nav-btn.active {
    background: var(--bg-card-hover);
    color: var(--text-primary);
    border-color: var(--accent-cyan);
  }

  /* Search */
  .search-bar {
    max-width: 900px;
    margin: 32px auto 24px;
    padding: 0 24px;
  }

  .search-input {
    width: 100%;
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent-cyan); }

  /* Stats */
  .stats-bar {
    max-width: 900px;
    margin: 0 auto 24px;
    padding: 0 24px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .stat-chip {
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-secondary);
  }

  .stat-chip strong {
    color: var(--accent-cyan);
    margin-right: 4px;
  }

  /* Category Tabs */
  .category-tabs {
    max-width: 900px;
    margin: 0 auto 24px;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .cat-tab {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cat-tab:hover { border-color: var(--text-secondary); }

  .cat-tab.active {
    background: var(--accent-pink);
    border-color: var(--accent-pink);
    color: white;
  }

  .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Cards Grid */
  .cards-grid {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 48px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent-cyan);
    transform: translateY(-2px);
  }

  .card-category {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .cat-cafe { background: rgba(255, 51, 102, 0.15); color: var(--accent-pink); }
  .cat-figure { background: rgba(0, 204, 255, 0.15); color: var(--accent-cyan); }
  .cat-event { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); }
  .cat-anime { background: rgba(255, 204, 0, 0.15); color: var(--accent-yellow); }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
  }

  .meta-label { color: var(--text-dim); }
  .meta-value { color: var(--text-secondary); }

  .card-status {
    position: absolute;
    top: 16px;
    right: 16px;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .status-active { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); }
  .status-upcoming { background: rgba(0, 204, 255, 0.15); color: var(--accent-cyan); }
  .status-ended { background: rgba(85, 85, 112, 0.3); color: var(--text-dim); }

  /* Detail Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 600px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 32px;
  }

  .modal-close {
    float: right;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 24px;
    cursor: pointer;
  }

  .modal-close:hover { color: var(--text-primary); }

  .modal-title {
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 8px;
    padding-right: 40px;
  }

  .modal-category {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .modal-section {
    margin-bottom: 16px;
  }

  .modal-section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .modal-section-content {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .modal-link {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 20px;
    border-radius: 8px;
    background: var(--accent-pink);
    color: white;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    transition: opacity 0.2s;
  }

  .modal-link:hover { opacity: 0.85; }

  /* Footer */
  .footer {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }

  .footer a { color: var(--accent-cyan); text-decoration: none; }

  /* Mobile */
  @media (max-width: 600px) {
    .nav { display: none; }
    .cards-grid { grid-template-columns: 1fr; }
    .header { padding: 12px 16px; }
    .search-bar, .stats-bar, .category-tabs, .cards-grid { padding: 0 16px; }
  }
</style>
</head>
<body>

    whereToBuy: "Good Smile Online Shop, AmiAmi, Amazon JP"
  }
];

// Render cards
function renderCards(filter = 'all', search = '') {
  const grid = document.getElementById('cardsGrid');
  let filtered = database;

  if (filter !== 'all') {
    filtered = filtered.filter(item => item.category === filter);
  }

  if (search) {
    const s = search.toLowerCase();
    filtered = filtered.filter(item =>
      item.title.toLowerCase().includes(s) ||
      (item.description && item.description.toLowerCase().includes(s)) ||
      (item.series && item.series.toLowerCase().includes(s))
    );
  }

  grid.innerHTML = filtered.map(item => {
    const catClass = `cat-${item.category}`;
    const catLabel = {cafe: 'Collab Cafe', figure: 'Figure', event: 'Event', anime: 'Anime News'}[item.category];
    const statusClass = `status-${item.status}`;
    const statusLabel = {active: 'Active', upcoming: 'Upcoming', ended: 'Ended'}[item.status];

    return `
      <div class="card" onclick="openModal(${item.id})">
        <span class="card-status ${statusClass}">${statusLabel}</span>
        <div class="card-category ${catClass}">${catLabel}</div>
        <div class="card-title">${item.title}</div>
        <div class="card-meta">
          ${item.dates ? `<div class="meta-row"><span class="meta-label">Dates</span><span class="meta-value">${item.dates}</span></div>` : ''}
          ${item.price ? `<div class="meta-row"><span class="meta-label">Price</span><span class="meta-value">${item.price}</span></div>` : ''}
          ${item.location ? `<div class="meta-row"><span class="meta-label">Location</span><span class="meta-value">${item.location}</span></div>` : ''}
          ${item.manufacturer ? `<div class="meta-row"><span class="meta-label">Maker</span><span class="meta-value">${item.manufacturer}</span></div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

// Modal
function openModal(id) {
  const item = database.find(i => i.id === id);
  if (!item) return;

  const catClass = `cat-${item.category}`;
  const catLabel = {cafe: 'Collab Cafe', figure: 'Figure', event: 'Event', anime: 'Anime News'}[item.category];

  let sections = '';

  if (item.description) sections += `<div class="modal-section"><div class="modal-section-title">Overview</div><div class="modal-section-content">${item.description}</div></div>`;
  if (item.dates) sections += `<div class="modal-section"><div class="modal-section-title">Dates</div><div class="modal-section-content">${item.dates}</div></div>`;
  if (item.location) sections += `<div class="modal-section"><div class="modal-section-title">Location</div><div class="modal-section-content">${item.location}</div></div>`;
  if (item.access) sections += `<div class="modal-section"><div class="modal-section-title">Access</div><div class="modal-section-content">${item.access}</div></div>`;
  if (item.reservation) sections += `<div class="modal-section"><div class="modal-section-title">Reservation</div><div class="modal-section-content">${item.reservation}</div></div>`;
  if (item.price) sections += `<div class="modal-section"><div class="modal-section-title">Price</div><div class="modal-section-content">${item.price}</div></div>`;
  if (item.series) sections += `<div class="modal-section"><div class="modal-section-title">Series</div><div class="modal-section-content">${item.series}</div></div>`;
  if (item.manufacturer) sections += `<div class="modal-section"><div class="modal-section-title">Manufacturer</div><div class="modal-section-content">${item.manufacturer}</div></div>`;
  if (item.releaseDate) sections += `<div class="modal-section"><div class="modal-section-title">Release</div><div class="modal-section-content">${item.releaseDate}</div></div>`;
  if (item.whereToBuy) sections += `<div class="modal-section"><div class="modal-section-title">Where to Buy</div><div class="modal-section-content">${item.whereToBuy}</div></div>`;

  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-category ${catClass}">${catLabel}</div>
    <div class="modal-title">${item.title}</div>
    ${sections}
    ${item.source ? `<a href="${item.source}" target="_blank" class="modal-link">View Source &rarr;</a>` : ''}
  `;

  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// Category tabs
document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderCards(tab.dataset.cat, document.getElementById('searchInput').value);
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  const activeCat = document.querySelector('.cat-tab.active').dataset.cat;
  renderCards(activeCat, e.target.value);
});

// Initial render
renderCards();
</script>
