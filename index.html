<body>

    <header class="header">
        <a href="/Japan-OTAKU-Insider/index.html" class="logo">
            <img src="/Japan-OTAKU-Insider/icons/icon-192.png" alt="Japan OTAKU Insider" class="logo-icon">
            <div class="logo-text">Japan <span>OTAKU</span> Insider</div>
        </a>
        <nav class="nav">
            <a href="/Japan-OTAKU-Insider/index.html" class="nav-btn active">Database</a>
            <a href="/Japan-OTAKU-Insider/about.html" class="nav-btn">About</a>
        </nav>
    </header>

    <div class="search-bar">
        <input type="text" class="search-input" placeholder="Search events, figures, cafes..." id="searchInput">
    </div>

    <div class="stats-bar" id="statsBar">
        <!-- Stats loaded via JS -->
    </div>

    <div class="category-tabs">
        <button class="cat-tab active" data-cat="all">All</button>
        <button class="cat-tab" data-cat="cafe"><span class="cat-dot" style="background:var(--accent-pink)"></span>
            Collab Cafes</button>
        <button class="cat-tab" data-cat="figure"><span class="cat-dot" style="background:var(--accent-cyan)"></span>
            Figures</button>
        <button class="cat-tab" data-cat="event"><span class="cat-dot" style="background:var(--accent-green)"></span>
            Events</button>
        <button class="cat-tab" data-cat="anime"><span class="cat-dot" style="background:var(--accent-yellow)"></span>
            Anime News</button>
        <button class="cat-tab" data-cat="vtuber"><span class="cat-dot" style="background:#bb33ff"></span>
            VTuber</button>
        <button class="cat-tab" data-cat="game"><span class="cat-dot" style="background:var(--accent-purple)"></span>
            Game News</button>
        <button class="cat-tab" data-cat="otaku-news"><span class="cat-dot" style="background:#ff8c00"></span> OTAKU NEWS</button>
    </div>

    <div class="cards-grid" id="cardsGrid">
        <!-- Cards loaded via JS -->
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal"></div>
    </div>

    <footer class="footer">
        Japan OTAKU Insider &copy; 2026 — Built by <a href="#">ichibo</a> | Your insider source for Japanese otaku
        culture
    </footer>

    <script src="/Japan-OTAKU-Insider/js/search.js"></script>
    <script src="/Japan-OTAKU-Insider/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>

</html>
